<section class="detail-page" *ngIf="!isLoading && product">

  <div class="detail-image">
    <img [src]="imageUrl" [alt]="product.name">
  </div>

  <div class="detail-info">

    <span class="category">
      {{ product.category }}
    </span>

    <h1>{{ product.name }}</h1>

    <p class="description">
      {{ product.description }}
    </p>

    <h2 class="price">
      ${{ product.price | number:'1.0-0' }}
    </h2>

    <p class="stock">
      Stock disponible: {{ product.stock }}
    </p>

<div class="purchase-actions">
  <div class="quantity-selector">
    <button type="button" (click)="decreaseQuantity()">−</button>
    <span>{{ quantity }}</span>
    <button type="button" (click)="increaseQuantity()">+</button>
  </div>

  <button class="add-cart-button" type="button" (click)="addToCart()">
    <i class="bi bi-cart3"></i>
    Agregar al carrito
  </button>
</div>
<div class="cart-toast" *ngIf="showCartMessage">
  Producto agregado al carrito
</div>

<button class="buy-now-button" type="button">
  Comprar ahora
</button>

  </div>

</section>

<p *ngIf="isLoading">
  Cargando producto...
</p>

<p *ngIf="!isLoading && errorMessage">
  {{ errorMessage }}
</p>
