<section class="cart-page">
  <header class="cart-header">
    <h1>Carrito de compras</h1>
    <p>Revisa tus productos antes de continuar.</p>
  </header>

  <p *ngIf="items.length === 0" class="empty-cart">
    Tu carrito está vacío.
  </p>

  <section class="cart-table" *ngIf="items.length > 0">
    <div class="cart-row cart-head">
      <span>Producto</span>
      <span>Precio</span>
      <span>Cantidad</span>
      <span>Total</span>
    </div>

    <article class="cart-row" *ngFor="let item of items">
      <div class="product-column">
        <img [src]="item.product.imageUrl" [alt]="item.product.name" />

        <div>
          <h2>{{ item.product.name }}</h2>
          <button type="button" (click)="removeProduct(item.product.id)">
            <i class="bi bi-trash"></i>
            Eliminar
          </button>
        </div>
      </div>

      <strong class="price">
        ${{ item.product.price | number:'1.0-0' }}
      </strong>

      <div class="quantity-control">
        <button type="button" (click)="decrease(item.product.id)">−</button>
        <span>{{ item.quantity }}</span>
        <button type="button" (click)="increase(item.product.id)">+</button>
      </div>

      <strong class="line-total">
        ${{ getItemTotal(item) | number:'1.0-0' }}
      </strong>
    </article>
  </section>

  <section class="cart-summary" *ngIf="items.length > 0">
    <div>
      <span>Total</span>
      <strong>${{ total | number:'1.0-0' }}</strong>
    </div>

    <button type="button">
      Finalizar compra
    </button>
  </section>
</section>
