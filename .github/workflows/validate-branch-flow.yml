name: Validate Branch Flow

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - develop
      - qa
      - main

permissions:
  pull-requests: write

jobs:
  validate-branch-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate branch flow
        id: evaluate
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          # PatrГіn obligatorio para ramas de feature: debe iniciar con HU- en mayГєsculas
          HU_PATTERN='^HU-[A-Z0-9]'

          VALID=true
          TITLE=""
          BODY=""

          case "$BASE" in
            develop)
              if echo "$HEAD" | grep -qE "$HU_PATTERN"; then
                echo "вњ… Flujo vГЎlido: ${HEAD} в†’ develop"
              else
                VALID=false
                TITLE="вќЊ Flujo de ramas invГЎlido вЂ” \`${HEAD}\` no puede hacer PR a \`develop\`"
                BODY=$(cat <<MARKDOWN
## вќЊ Flujo de ramas invГЎlido

Este Pull Request intenta fusionar \`${HEAD}\` в†’ \`develop\`, lo cual **no estГЎ permitido**.

### ВїPor quГ© fue bloqueado?

La rama origen \`${HEAD}\` no sigue el formato requerido para integrarse a \`develop\`.

### Formato obligatorio para ramas de feature

\`\`\`
HU-{AMBIENTE}-{INICIALES}-{Descripcion}
\`\`\`

**Ejemplos vГЎlidos:**
- \`HU-DEV-JSA-01-nueva-funcionalidad\`
- \`HU-DEV-SALB_10\`
- \`HU-DEV-DMC-FE-01-componente-login\`

### Flujos permitidos en este repositorio

| Origen | Destino | Estado |
|--------|---------|--------|
| \`HU-*\` | \`develop\` | вњ… Permitido |
| \`develop\` | \`qa\` | вњ… Permitido |
| \`qa\` | \`main\` | вњ… Permitido |
| Cualquier otro | Cualquier otro | вќЊ Bloqueado |

### AcciГіn requerida

1. Renombra tu rama siguiendo el formato \`HU-{AMBIENTE}-{INICIALES}-{Descripcion}\`
2. Actualiza la rama base de este PR a \`develop\`
3. Vuelve a abrir el PR

> рџ”’ Este check es requerido. El merge permanecerГЎ bloqueado hasta corregir el flujo.
MARKDOWN
)
              fi
              ;;

            qa)
              if [ "$HEAD" = "develop" ]; then
                echo "вњ… Flujo vГЎlido: develop в†’ qa"
              else
                VALID=false
                TITLE="вќЊ Flujo de ramas invГЎlido вЂ” solo \`develop\` puede hacer PR a \`qa\`"
                BODY=$(cat <<MARKDOWN
## вќЊ Flujo de ramas invГЎlido

Este Pull Request intenta fusionar \`${HEAD}\` в†’ \`qa\`, lo cual **no estГЎ permitido**.

### Flujo correcto

\`\`\`
HU-* в†’ develop в†’ qa в†’ main
\`\`\`

Para promover cambios a \`qa\` debes:
1. Asegurarte de que tus cambios estГЎn fusionados en \`develop\`
2. Crear un PR desde \`develop\` в†’ \`qa\`

### Flujos permitidos

| Origen | Destino | Estado |
|--------|---------|--------|
| \`HU-*\` | \`develop\` | вњ… Permitido |
| \`develop\` | \`qa\` | вњ… Permitido |
| \`qa\` | \`main\` | вњ… Permitido |
| \`${HEAD}\` | \`qa\` | вќЊ Bloqueado |

> рџ”’ El merge permanecerГЎ bloqueado hasta que el PR sea \`develop\` в†’ \`qa\`.
MARKDOWN
)
              fi
              ;;

            main)
              if [ "$HEAD" = "qa" ]; then
                echo "вњ… Flujo vГЎlido: qa в†’ main"
              else
                VALID=false
                TITLE="вќЊ Flujo de ramas invГЎlido вЂ” solo \`qa\` puede hacer PR a \`main\`"
                BODY=$(cat <<MARKDOWN
## вќЊ Flujo de ramas invГЎlido

Este Pull Request intenta fusionar \`${HEAD}\` в†’ \`main\`, lo cual **no estГЎ permitido**.

### Flujo correcto

\`\`\`
HU-* в†’ develop в†’ qa в†’ main
\`\`\`

Para hacer un release a \`main\` debes:
1. Asegurarte de que los cambios estГЎn probados en \`qa\`
2. Crear un PR desde \`qa\` в†’ \`main\`

### Flujos permitidos

| Origen | Destino | Estado |
|--------|---------|--------|
| \`HU-*\` | \`develop\` | вњ… Permitido |
| \`develop\` | \`qa\` | вњ… Permitido |
| \`qa\` | \`main\` | вњ… Permitido |
| \`${HEAD}\` | \`main\` | вќЊ Bloqueado |

> рџ”’ El merge permanecerГЎ bloqueado hasta que el PR sea \`qa\` в†’ \`main\`.
MARKDOWN
)
              fi
              ;;

            *)
              echo "в„№пёЏ  Rama base '${BASE}' no protegida вЂ” flujo no validado."
              ;;
          esac

          echo "valid=${VALID}" >> "$GITHUB_OUTPUT"
          {
            echo "title<<__EOF__"
            printf "%s" "$TITLE"
            echo ""
            echo "__EOF__"
            echo "body<<__EOF__"
            printf "%s" "$BODY"
            echo ""
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR if flow is invalid
        if: steps.evaluate.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `${{ steps.evaluate.outputs.title }}`;
            const body  = `${{ steps.evaluate.outputs.body }}`;
            const fullBody = `${title}\n\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- branch-flow-bot -->';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Flujo de ramas invГЎlido')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody + `\n\n${marker}`,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         fullBody + `\n\n${marker}`,
              });
            }

      - name: Fail job if flow is invalid
        if: steps.evaluate.outputs.valid == 'false'
        run: |
          echo ""
          echo "=============================================="
          echo "  MERGE BLOQUEADO вЂ” FLUJO DE RAMAS INVГЃLIDO"
          echo "=============================================="
          echo "  Origen : ${{ github.head_ref }}"
          echo "  Destino: ${{ github.base_ref }}"
          echo ""
          echo "  Flujos permitidos:"
          echo "    HU-*    в†’ develop"
          echo "    develop в†’ qa"
          echo "    qa      в†’ main"
          echo "=============================================="
          exit 1
