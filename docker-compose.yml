services:
  postgres-db:
    image: postgres:15
    container_name: accesorios-db
    restart: always
    environment:
      POSTGRES_DB: accesorios_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - accesorios-network

  frontend:
    build: .
    container_name: accesorios-frontend
    restart: always
    ports:
      - "82:80"
    depends_on:
      - postgres-db
    networks:
      - accesorios-network

  inventory-service:
    build:
      context: ../../proyecto-dm/proyecto-dm/accesorios-dm-inventory-service
    container_name: accesorios-inventory
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/accesorios_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: inventario
      SERVER_PORT: 8081
    depends_on:
      - postgres-db
    networks:
      - accesorios-network

  payment-service:
    build:
      context: ../../proyecto-dm/proyecto-dm/accesorios-dm-payment-service
    container_name: accesorios-payment
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: accesorios_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_SCHEMA: pago
      NODE_ENV: development
    depends_on:
      - postgres-db
    networks:
      - accesorios-network

  api-gateway:
    build:
      context: ../../proyecto-dm/proyecto-dm/accesorios-dm-api-gateway
    container_name: accesorios-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - inventory-service
      - payment-service
    networks:
      - accesorios-network

volumes:
  postgres_data:

networks:
  accesorios-network:
    driver: bridge